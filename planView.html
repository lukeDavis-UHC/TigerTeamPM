<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #E9E7DE;
  --surface:  #FFFFFF;
  --border:   #D8D5CB;
  --border-md:#B8B4A8;
  --text:     #17150F;
  --muted:    #56534C;
  --faint:    #8E8B84;
  --done:     #166534; --donebg: #DCFCE7; --doneborder: #86EFAC;
  --wip:      #92400E; --wipbg:  #FEF3C7; --wipborder:  #FCD34D;
  --todo:     #374151; --todobg: #F1F5F9; --todoborder: #CBD5E1;
  --blocked:  #7F1D1D; --blockedbg:#FEE2E2; --blockedborder:#FCA5A5;
  --over:     #7F1D1D; --overbg: #FEE2E2;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── TOP BAR ─────────────────────────────────────────────────────────── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 52px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 300;
}
.topbar-brand { display: flex; align-items: baseline; gap: 8px; }
.topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -.02em; }
.topbar-sub   { font-size: 11px; color: var(--faint); font-family: var(--mono); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.last-updated { font-size: 11px; font-family: var(--mono); color: var(--faint); }
.load-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 5px 13px; background: var(--text); color: #fff;
  border: none; border-radius: 6px; cursor: pointer; transition: opacity .15s;
}
.load-btn:hover { opacity: .8; }
#file-input { display: none; }

/* ── MAIN ────────────────────────────────────────────────────────────── */
.main { max-width: 1080px; margin: 0 auto; padding: 22px 28px 64px; }

/* ── VIEW TABS ────────────────────────────────────────────────────────── */
.view-tab {
  padding: 14px 16px; cursor: pointer; text-align: center; font-weight: 600;
  font-size: 13px; letter-spacing: -0.01em; transition: all 0.15s ease;
  border-right: 1px solid var(--border);
}
.view-tab:last-child { border-right: none; }
.view-tab:hover { background: #F9F8F5; }
.view-tab.active {
  background: linear-gradient(135deg, #FDF0E6 0%, #FFFFFF 100%);
  color: var(--text);
  font-weight: 700;
  box-shadow: inset 0 -3px 0 #B5540A;
}
.view-tab:not(.active) {
  background: var(--surface);
  color: var(--muted);
}

/* ── PHASE TABS ──────────────────────────────────────────────────────── */
.phase-tabs {
  display: grid; grid-template-columns: repeat(4,1fr);
  margin-bottom: 16px; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.phase-tab {
  background: var(--surface); padding: 16px 14px 14px;
  cursor: pointer; text-align: left; transition: background .1s;
  border-right: 1px solid var(--border);
}
.phase-tab:last-child { border-right: none; }
.phase-tab:hover { background: var(--bg); }
.phase-tab.active { background: var(--surface); box-shadow: inset 0 -3px 0 currentColor; }
.tab-num   { font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 4px; }
.tab-name  { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; letter-spacing: -.01em; }
.tab-dates { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 8px; }
.tab-gate  { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
.tab-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.tab-bar   { height: 100%; border-radius: 2px; transition: width .4s ease; }
.tab-counts { display: flex; gap: 8px; font-size: 10px; font-family: var(--mono); color: var(--faint); margin-top: 6px; }
.tab-counts span { display: flex; align-items: center; gap: 3px; }
.mini-dot  { display: inline-block; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ── DETAIL PANEL ────────────────────────────────────────────────────── */
.detail-panel { display: none; }
.detail-panel.visible { display: block; }

/* Phase header */
.phase-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px 10px 0 0; padding: 16px 20px; border-bottom: none;
}
.ph-left .ph-label { font-family: var(--mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
.ph-left .ph-title { font-size: 15px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; }
.ph-left .ph-why   { font-size: 12px; color: var(--muted); line-height: 1.6; max-width: 580px; }
.ph-right          { text-align: right; flex-shrink: 0; padding-left: 20px; }
.ph-gate           { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 4px; }
.ph-dates          { font-size: 11px; font-family: var(--mono); color: var(--faint); }

/* Stats strip */
.stats-strip {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--border);
  border-top: 1px solid var(--border-md); padding: 10px 20px;
}
.stat-pill {
  font-size: 11px; font-family: var(--mono); padding: 3px 9px;
  border-radius: 20px; display: inline-flex; align-items: center; gap: 5px;
}
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }
.sp-total    { background: var(--todobg); color: var(--muted); }
.sp-done     { background: var(--donebg); color: var(--done); }
.sp-wip      { background: var(--wipbg);  color: var(--wip); }
.sp-todo     { background: var(--todobg); color: var(--todo); }
.sp-overdue  { background: var(--overbg); color: var(--over); }
.stats-sep   { color: var(--border-md); font-size: 14px; margin: 0 2px; }

/* Toggle button */
.toggle-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 10px 20px; border-top: none;
}
.toggle-label { font-size: 11px; font-family: var(--mono); color: var(--faint); }
.toggle-switch {
  width: 40px; height: 22px; background: var(--border);
  border-radius: 11px; cursor: pointer; position: relative;
  transition: background .2s; border: 1px solid var(--border-md);
}
.toggle-switch.active { background: var(--done); border-color: var(--done); }
.toggle-switch-dot {
  width: 18px; height: 18px; background: white;
  border-radius: 50%; position: absolute;
  top: 2px; left: 2px; transition: left .2s;
}
.toggle-switch.active .toggle-switch-dot { left: 20px; }

/* ── TASK TABLE ──────────────────────────────────────────────────────── */
.task-table {
  background: var(--surface); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 10px 10px; overflow: hidden;
}
.col-grid {
  display: grid;
  grid-template-columns: 118px 1fr 162px 78px 96px;
}
.table-header {
  padding: 8px 16px; border-bottom: 2px solid var(--border-md);
  background: #E0DDD3;
}
.th { font-size: 10px; font-family: var(--mono); font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }

/* Task row */
.task-row-wrap { border-bottom: 1px solid var(--border); }
.task-row-wrap:last-child { border-bottom: none; }
.task-row-wrap.hidden { display: none; }
.task-row-wrap.completed { background: #F5F5F5; }
.task-row {
  align-items: center; padding: 10px 16px; cursor: pointer;
  transition: background .1s; user-select: none;
}
.task-row:hover   { background: #F0EDE4; }
.task-row.is-open { background: #EAE7DE; }
.task-row-wrap.completed .task-row:hover { background: #F5F5F5; }

/* WS tag */
.ws-tag {
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  padding: 3px 8px; border-radius: 4px; display: inline-block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 106px;
  border: 1px solid currentColor; opacity: .85;
}

/* Task name cell */
.task-name-cell { padding-right: 16px; }
.task-name { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); }
.task-name.done { color: var(--faint); font-weight: 400; text-decoration: line-through; text-decoration-color: var(--border-md); }
.task-note { font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 3px; }

/* Due date */
.task-due { font-size: 11px; font-family: var(--mono); color: var(--muted); }
.task-due.overdue { color: var(--over); font-weight: 600; }
.task-due.soon    { color: var(--wip); font-weight: 500; }

/* Progress (col 3 on parent rows) */
.progress-cell { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.progress-bar-wrap { width: 90px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.progress-label { font-size: 10px; font-family: var(--mono); font-weight: 500; color: var(--muted); }
.progress-label.all-done { color: var(--done); font-weight: 600; }

/* Status badge */
.status-badge {
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  padding: 3px 9px; border-radius: 5px; white-space: nowrap;
  display: inline-block; text-align: center; border-width: 1px; border-style: solid;
}
.sb-complete   { background: var(--donebg);    color: var(--done);    border-color: var(--doneborder); }
.sb-wip        { background: var(--wipbg);     color: var(--wip);     border-color: var(--wipborder); }
.sb-notstarted { background: var(--todobg);    color: var(--todo);    border-color: var(--todoborder); }
.sb-blocked    { background: var(--blockedbg); color: var(--blocked); border-color: var(--blockedborder); }

/* Expand indicator */
.expand-chevron { font-size: 10px; color: var(--faint); transition: transform .15s; margin-left: 5px; display: inline-block; }
.is-open .expand-chevron { transform: rotate(90deg); }

/* ── SUBTASK DRAWER ──────────────────────────────────────────────────── */
.sub-drawer { display: none; background: var(--surface); border-top: 1px dashed var(--border); border-left: 3px solid var(--border-md); }
.sub-drawer.open { display: block; }
.sub-drawer-inner { padding: 0; }

.sub-row {
  align-items: flex-start; padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.sub-row:last-child { border-bottom: none; }
.sub-row:hover { background: #EDE9DF; }
.sub-row.sub-done { background: #F5F5F5; }
.sub-row.sub-done:hover { background: #F5F5F5; }
.sub-row.sub-done .sub-name { color: var(--faint); font-weight: 400; text-decoration: line-through; text-decoration-color: var(--border-md); }
.sub-row.hidden { display: none; }

.sub-dot-cell { display: flex; align-items: flex-start; padding-top: 3px; padding-left: 26px; }
.sub-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-done    { background: var(--done); }
.dot-wip     { background: var(--wip); }
.dot-todo    { background: var(--border-md); }
.dot-blocked { background: var(--blocked); }

.sub-name-wrap { padding-right: 14px; }
.sub-name      { font-size: 12px; font-weight: 500; line-height: 1.4; color: var(--text); }
.sub-notes     { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.sub-owner-col { font-size: 10px; font-family: var(--mono); color: var(--faint); align-self: center; }
.sub-due   { font-size: 11px; font-family: var(--mono); color: var(--muted); }
.sub-due.overdue { color: var(--over); font-weight: 600; }

/* ── RISK SECTION ────────────────────────────────────────────────────── */
.risks-wrap {
  margin-top: 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.risks-header {
  padding: 10px 18px; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted); background: #FEF9F8;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px;
}
.risk-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 18px; border-bottom: 1px solid var(--border);
  font-size: 12px; line-height: 1.5;
}
.risk-row:last-child { border-bottom: none; }
.risk-icon  { color: var(--over); flex-shrink: 0; font-size: 13px; margin-top: 1px; }
.risk-title { font-weight: 500; color: var(--over); }
.risk-body  { color: var(--muted); margin-top: 2px; font-size: 11px; }
.no-risks   { padding: 12px 18px; font-size: 12px; color: var(--faint); }

/* ── LEGEND ──────────────────────────────────────────────────────────── */
.legend-strip {
  margin-top: 12px; display: flex; align-items: center; gap: 14px;
  font-size: 11px; color: var(--muted); flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; }

/* ── EMPTY STATE ─────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 80px 24px; }
.empty-icon  { font-size: 38px; margin-bottom: 14px; opacity: .4; }
.empty-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.empty-sub   { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 360px; margin: 0 auto 22px; }

.no-results { padding: 24px; text-align: center; font-size: 12px; color: var(--faint); border-radius: 0 0 10px 10px; }

@media (max-width: 740px) {
  .main { padding: 12px; }
  .phase-tabs { grid-template-columns: repeat(2,1fr); border-radius: 8px; }
  .col-grid { grid-template-columns: 80px 1fr 80px !important; }
  .col-grid > *:nth-child(4), .col-grid > *:nth-child(5) { display: none; }
  .topbar { padding: 0 14px; }
}
</style>
</head>

      ],
      "wsOrder": [
        "Steady-State"
      ]
    },
    "Rollout": {
      "tasks": [
        {
          "id": "task_42",
          "name": "Full Rollout",
          "status": null,
          "owner": "",
          "date": null,
          "notes": "",
          "risk": "",
          "ws": "Rollout",
          "subtasks": []
        }
      ],
      "wsOrder": [
        "Rollout"
      ]
    }
  }
}
</script>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allPhases  = {};
let fullRolloutPhases = {};
let activePhase = 0;
let showCompleted = true;
let activeView = 'waves';
let openRows   = new Set();

// ─── Constants ───────────────────────────────────────────────────────────────
const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
const SOON  = 14;

const PHASE_COLORS = [
  { color:'#B5540A', bg:'#FDF0E6', gateStyle:'background:#FDF0E6;color:#B5540A' },
  { color:'#0A6E4E', bg:'#E6F6F0', gateStyle:'background:#E6F6F0;color:#0A6E4E' },
  { color:'#1550A0', bg:'#E8EFFA', gateStyle:'background:#E8EFFA;color:#1550A0' },
  { color:'#3B6D11', bg:'#EBF4E0', gateStyle:'background:#EBF4E0;color:#3B6D11' },
];

const PHASE_DEFAULTS = {
  'Pre-conditions': { idx:0, label:'Phase 1', ...PHASE_COLORS[0], dates:'Apr 1 – Apr 24', gate:'SCIM + Finance sign-off',
    why:'All technical prerequisites before any user gets access. If anything here slips, the rollout moves right.' },
  'Enablement':     { idx:1, label:'Phase 2', ...PHASE_COLORS[1], dates:'Apr 8 – May 1', gate:'Training + support ready',
    why:'Human infrastructure — training content, quota/billing setup, comms, and help-desk readiness.' },
  'Rollout':        { idx:2, label:'Phase 3', ...PHASE_COLORS[2], dates:'Apr 8 – Jul 3', gate:'Wave complete ×3',
    why:'Three-wave deployment so issues surface before going wider. Each wave requires its own approval and comms.' },
  'Steady State':   { idx:3, label:'Phase 4', ...PHASE_COLORS[3], dates:'Jul 3 onward', gate:'BAU handoff',
    why:'Post-rollout: value realization, train-the-trainer, communities of practice, and BAU transition.' },
};

const WORKSTREAM_PHASE = {
  'Program Mgmt':'Pre-conditions','Contract':'Pre-conditions','Security':'Pre-conditions',
  'Network':'Pre-conditions','Access':'Pre-conditions','DevEx':'Pre-conditions',
  'Training':'Enablement','Finance':'Enablement','Support':'Enablement',
  'Communication':'Enablement','Signoff':'Enablement','Go/No-Go':'Enablement',
  'Rollout':'Rollout','Steady-State':'Steady State',
};

const RISK_KEYWORDS = ['at risk','escalate','unresponsive','blocker','delay','tbd','must confirm'];

// ─── Status helpers ───────────────────────────────────────────────────────────
const sNorm = s => {
  if (!s) return 'notstarted';
  const l = s.toLowerCase().replace(/[\s_\-]/g,'');
  if (l.includes('complet')||l==='done') return 'complete';
  if (l.includes('wip')||l.includes('progress')) return 'wip';
  if (l.includes('block')) return 'blocked';
  return 'notstarted';
};
const S_LABEL = { complete:'Complete', wip:'WIP', notstarted:'Not started', blocked:'Blocked' };
const S_BADGE = { complete:'sb-complete', wip:'sb-wip', notstarted:'sb-notstarted', blocked:'sb-blocked' };
const S_DOT   = { complete:'dot-done', wip:'dot-wip', notstarted:'dot-todo', blocked:'dot-blocked' };

function fmtDate(d) {
  if (!d) return '';
  const date = d instanceof Date ? d : new Date(d);
  if (isNaN(date)) return typeof d === 'string' ? d : '';
  return date.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function dateStatus(d) {
  if (!d) return '';
  const date = d instanceof Date ? d : new Date(d);
  if (isNaN(date)) return '';
  if (date < TODAY) return 'overdue';
  const soon = new Date(TODAY); soon.setDate(soon.getDate() + SOON);
  if (date <= soon) return 'soon';
  return '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isRisky(notes) {
  const l = (notes||'').toLowerCase();
  return RISK_KEYWORDS.some(k => l.includes(k));
}

// ─── Load embedded data ──────────────────────────────────────────────────────
function loadEmbeddedData() {
  const dataEl = document.getElementById('embedded-data');
  if (!dataEl) {
    console.warn('No embedded data found');
    return;
  }
  try {
    const data = JSON.parse(dataEl.textContent);
    allPhases = data.waves || {};
    fullRolloutPhases = data.rollout || {};
    setUpdated(null);
    render();
  } catch (e) {
    console.error('Failed to parse embedded data:', e);
  }
}

// ─── Progress helpers ─────────────────────────────────────────────────────────
function calcPhaseProgress(phaseName) {
  const phases = getCurrentPhases();
  const pd = phases[phaseName];
  if (!pd) return { done:0, wip:0, todo:0, total:0, pct:0, overdue:0 };
  let done=0, wip=0, todo=0, overdue=0;
  pd.tasks.forEach(t => {
    const s = sNorm(t.status);
    if (s==='complete') done++;
    else if (s==='wip') wip++;
    else todo++;
    if (s !== 'complete' && t.date) {
      const d = t.date instanceof Date ? t.date : new Date(t.date);
      if (!isNaN(d) && d < TODAY) overdue++;
    }
  });
  const total = done + wip + todo;
  return { done, wip, todo, total, pct: total ? Math.round(done/total*100) : 0, overdue };
}

// ─── Render ───────────────────────────────────────────────────────────────────
function setUpdated(fn) {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    (fn ? fn + ' · ' : '') +
    now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
    now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function render() {
  renderTabs();
  renderDetail(activePhase);
}

function getCurrentPhases() {
  return activeView === 'fullrollout' ? fullRolloutPhases : allPhases;
}

function renderTabs() {
  const phases = Object.entries(PHASE_DEFAULTS).sort((a,b) => a[1].idx - b[1].idx);
  const currentPhases = getCurrentPhases();
  const tabsId = activeView === 'fullrollout' ? 'phase-tabs-rollout' : 'phase-tabs';
  document.getElementById(tabsId).innerHTML = phases.map(([name, meta]) => {
    const p = calcPhaseProgress(name);
    const isActive = meta.idx === activePhase;
    return `<div class="phase-tab${isActive?' active':''}"
      style="color:${meta.color}"
      onclick="selectPhase(${meta.idx})">
      <div class="tab-num" style="color:${meta.color}">${meta.label}</div>
      <div class="tab-name">${esc(name)}</div>
      <div class="tab-dates">${meta.dates}</div>
      <div class="tab-gate" style="${meta.gateStyle}">${esc(meta.gate)}</div>
      <div class="tab-bar-wrap"><div class="tab-bar" style="width:${p.pct}%;background:${meta.color}"></div></div>
      <div class="tab-counts">
        <span><span class="mini-dot" style="background:#2E6E1E"></span>${p.done}</span>
        <span><span class="mini-dot" style="background:#B5540A"></span>${p.wip}</span>
        <span><span class="mini-dot" style="background:#A09E98"></span>${p.todo}</span>
        ${p.overdue ? `<span><span class="mini-dot" style="background:#B91C1C"></span>${p.overdue} late</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderDetail(phaseIdx) {
  const phaseName = Object.keys(PHASE_DEFAULTS).find(k => PHASE_DEFAULTS[k].idx === phaseIdx);
  if (!phaseName) return;
  const meta = PHASE_DEFAULTS[phaseName];
  const phases = getCurrentPhases();
  const pd   = phases[phaseName];
  const tasks = pd ? pd.tasks : [];

  // ── Stats ──────────────────────────────────────────────────────────────────
  const p = calcPhaseProgress(phaseName);
  const statsHTML = `
    <div class="stats-strip">
      <span class="stat-pill sp-total"><span class="stat-dot" style="background:var(--border-md)"></span>${p.total} tasks</span>
      <span class="stats-sep">·</span>
      <span class="stat-pill sp-done"><span class="stat-dot" style="background:var(--done)"></span>${p.done} complete</span>
      <span class="stat-pill sp-wip"><span class="stat-dot" style="background:var(--wip)"></span>${p.wip} in progress</span>
      <span class="stat-pill sp-todo"><span class="stat-dot" style="background:var(--faint)"></span>${p.todo} not started</span>
      ${p.overdue ? `<span class="stats-sep">·</span><span class="stat-pill sp-overdue"><span class="stat-dot" style="background:var(--over)"></span>${p.overdue} overdue</span>` : ''}
    </div>`;

  // ── Toggle bar ─────────────────────────────────────────────────────────────
  const toggleHTML = `
    <div class="toggle-bar">
      <span class="toggle-label">Show completed:</span>
      <div class="toggle-switch${showCompleted ? ' active' : ''}" onclick="toggleShowCompleted()">
        <div class="toggle-switch-dot"></div>
      </div>
    </div>`;

  // ── Task table rows ────────────────────────────────────────────────────────
  let tableRows = '';
  if (tasks.length === 0) {
    tableRows = `<div class="no-results">No data for this phase.</div>`;
  } else {
    tasks.forEach(task => {
      const s        = sNorm(task.status);
      const dateStr  = fmtDate(task.date);
      const ds       = dateStatus(task.date);
      const isOpen   = openRows.has(task.id);
      const subs     = task.subtasks;
      const subDone  = subs.filter(sub => sNorm(sub.status) === 'complete').length;
      const subTotal = subs.length;
      const subPct   = subTotal ? Math.round(subDone/subTotal*100) : 0;

      const displayOwner = task.owner ||
        (subs.find(sub => sub.owner) || {}).owner || '';

      let derivedStatus = sNorm(task.status);
      if (subTotal > 0) {
        const allComplete = subs.every(sub => sNorm(sub.status) === 'complete');
        const allNotStarted = subs.every(sub => sNorm(sub.status) === 'notstarted');
        if (allComplete) derivedStatus = 'complete';
        else if (!allNotStarted) derivedStatus = 'wip';
      }

      const subRowsHTML = subs.length ? subs.map(sub => {
        const ss    = sNorm(sub.status);
        const subDs = sub.date ? dateStatus(sub.date) : '';
        const subHidden = !showCompleted && ss === 'complete';
        return `<div class="sub-row col-grid${ss==='complete'?' sub-done':''}${subHidden ? ' hidden' : ''}">
          <div class="sub-dot-cell"><span class="sub-dot ${S_DOT[ss]}"></span></div>
          <div class="sub-name-wrap">
            <div class="sub-name">${esc(sub.name)}</div>
            ${sub.notes ? `<div class="sub-notes">${esc(sub.notes)}</div>` : ''}
          </div>
          <div class="sub-owner-col">${sub.owner ? esc(sub.owner) : ''}</div>
          <div class="sub-due${subDs?' '+subDs:''}">${fmtDate(sub.date)||'—'}</div>
          <span class="status-badge ${S_BADGE[ss]}">${S_LABEL[ss]}</span>
        </div>`;
      }).join('') : `<div style="padding:10px 16px;font-size:11px;color:var(--faint);font-style:italic">No sub-steps recorded.</div>`;

      let hidden = false;

      tableRows += `
        <div class="task-row-wrap${hidden?' hidden':''}${derivedStatus==='complete'?' completed':''}" id="wrap-${task.id}" data-row-id="${task.id}">
          <div class="task-row col-grid${isOpen?' is-open':''}">
            <div style="align-self:center">
              <span class="ws-tag" style="background:${meta.bg};color:${meta.color}">${esc(task.ws)}</span>
            </div>
            <div class="task-name-cell">
              <span class="task-name${subPct===100?' done':''}">${esc(task.name)}</span>
              <span class="expand-chevron">›</span>
              ${task.notes ? `<div class="task-note">${esc(task.notes)}</div>` : ''}
            </div>
            <div class="progress-cell">
              ${subTotal > 0 ? `
                <div class="progress-bar-wrap">
                  <div class="progress-bar-fill" style="width:${subPct}%;background:${subPct===100?'var(--done)':meta.color}"></div>
                </div>
                <div class="progress-label${subPct===100?' all-done':''}">${subDone}/${subTotal} steps</div>
              ` : `<div class="progress-label">—</div>`}
            </div>
            <div class="task-due">—</div>
            <span class="status-badge ${S_BADGE[derivedStatus]}">${S_LABEL[derivedStatus]}</span>
          </div>
          <div class="sub-drawer${isOpen?' open':''}" id="drawer-${task.id}">
            <div class="sub-drawer-inner">
              ${subRowsHTML}
            </div>
          </div>
        </div>`;
    });
  }

  // ── Risks ──────────────────────────────────────────────────────────────────
  const hasRiskCol = tasks.some(t => t.risk || t.subtasks.some(s => s.risk));
  const risks = [];
  tasks.forEach(task => {
    if (hasRiskCol) {
      if (task.risk) risks.push({ title: task.name, body: task.risk });
      task.subtasks.forEach(sub => { if (sub.risk) risks.push({ title: sub.name, body: sub.risk }); });
    } else {
      if (isRisky(task.notes) && task.notes) risks.push({ title: task.name, body: task.notes });
      task.subtasks.forEach(sub => {
        const l = (sub.notes||'').toLowerCase();
        if (['at risk','escalate','unresponsive'].some(k => l.includes(k)) && sub.notes)
          risks.push({ title: sub.name, body: sub.notes });
      });
    }
  });
  const risksHTML = `
    <div class="risks-wrap">
      <div class="risks-header">
        <span style="color:var(--over)">&#9888;</span>
        Risks &amp; open questions
        <span style="font-weight:400;color:var(--faint);text-transform:none;letter-spacing:0;font-size:11px">${risks.length ? risks.length + ' flagged' : '— none flagged'}</span>
      </div>
      ${risks.length
        ? risks.map(r => `<div class="risk-row">
            <div class="risk-icon">&#9888;</div>
            <div><div class="risk-title">${esc(r.title)}</div><div class="risk-body">${esc(r.body)}</div></div>
          </div>`).join('')
        : `<div class="no-risks">No notes flagged as risks for this phase.</div>`}
    </div>`;

  // ── Assemble ───────────────────────────────────────────────────────────────
  const panelId = activeView === 'fullrollout' ? 'detail-panel-rollout' : 'detail-panel';
  const panel = document.getElementById(panelId);
  panel.className = 'detail-panel visible';
  panel.innerHTML = `
    <div class="phase-header">
      <div class="ph-left">
        <div class="ph-label" style="color:${meta.color}">${meta.label} · ${esc(phaseName)}</div>
        <div class="ph-title">${esc(phaseName)}</div>
        <div class="ph-why">${esc(meta.why)}</div>
      </div>
      <div class="ph-right">
        <div class="ph-gate">${esc(meta.gate)}</div>
        <div class="ph-dates">${meta.dates}</div>
      </div>
    </div>
    ${statsHTML}
    ${toggleHTML}
    <div class="task-table">
      <div class="table-header col-grid">
        <div class="th">Workstream</div>
        <div class="th">Task</div>
        <div class="th">Steps</div>
        <div class="th">Due</div>
        <div class="th">Status</div>
      </div>
      <div id="task-rows">${tableRows}</div>
    </div>
    ${risksHTML}
    <div class="legend-strip">
      <span style="font-size:11px;color:var(--faint)">Status:</span>
      <span class="legend-item"><span class="mini-dot" style="background:var(--done)"></span>Complete</span>
      <span class="legend-item"><span class="mini-dot" style="background:var(--wip)"></span>In Progress</span>
      <span class="legend-item"><span class="mini-dot" style="background:var(--faint)"></span>Not Started</span>
      <span class="legend-item"><span class="mini-dot" style="background:var(--blocked)"></span>Blocked</span>
      <span style="margin-left:8px;font-size:11px;color:var(--faint)">Click any row to expand subtasks.</span>
    </div>`;
  attachRowClickHandlers();
}

// ─── Interaction ──────────────────────────────────────────────────────────────
function toggleRow(id) {
  if (openRows.has(id)) openRows.delete(id);
  else openRows.add(id);

  const isOpen = openRows.has(id);
  const wrap   = document.getElementById('wrap-' + id);
  const drawer = document.getElementById('drawer-' + id);
  if (!wrap || !drawer) return;

  const row = wrap.querySelector('.task-row');
  if (row) {
    if (isOpen) row.classList.add('is-open');
    else        row.classList.remove('is-open');
  }
  if (isOpen) drawer.classList.add('open');
  else drawer.classList.remove('open');
}

function attachRowClickHandlers() {
  const panelId = activeView === 'fullrollout' ? 'detail-panel-rollout' : 'detail-panel';
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const container = panel.querySelector('#task-rows');
  if (!container) return;
  container.addEventListener('click', function(e) {
    const row = e.target.closest('.task-row');
    if (!row) return;
    const wrap = row.closest('[data-row-id]');
    if (!wrap) return;
    toggleRow(wrap.dataset.rowId);
  });
}

function toggleShowCompleted() {
  showCompleted = !showCompleted;
  renderDetail(activePhase);
}

function selectPhase(idx) {
  activePhase  = idx;
  renderTabs();
  renderDetail(idx);
}

function switchView(view) {
  activeView = view;
  activePhase = 0;
  showCompleted = true;

  const wavesTab = document.getElementById('view-tab-waves');
  const rolloutTab = document.getElementById('view-tab-rollout');
  if (view === 'waves') {
    wavesTab.classList.add('active');
    rolloutTab.classList.remove('active');
  } else {
    wavesTab.classList.remove('active');
    rolloutTab.classList.add('active');
  }

  document.getElementById('view-waves').style.display = view === 'waves' ? 'block' : 'none';
  document.getElementById('view-fullrollout').style.display = view === 'fullrollout' ? 'block' : 'none';

  renderTabs();
  renderDetail(0);
}

// ─── Initialize on page load ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadEmbeddedData);
</script>

</body>
</html>
